<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W05 Quiz: HTML & CSS Fundamentals</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <header>
        <h1>HTML & CSS Quiz</h1>
    </header>
    <main>
        <form>
            <div class="form-item">
                <label for="q1">1. Who is known as the "father" of the World Wide Web?</label>
                <input type="text" id="q1" name="q1">
            </div>

            <div class="form-item">
                <label for="q2">2. Explain the difference between an ID and a Class in CSS:</label>
                <textarea id="q2" name="q2" rows="4"></textarea>
            </div>

            <div class="form-item">
                <label for="q3">3. Which HTML tag is used for the largest heading?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="h1">&lt;h1&gt;</option>
                    <option value="header">&lt;header&gt;</option>
                    <option value="head">&lt;head&gt;</option>
                </select>
            </div>

            <div class="form-item">
                <label for="q4">4. How many levels of headings are available in HTML (1-6)?</label>
                <input type="number" id="q4" name="q4">
            </div>

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 | Quiz Activity</p>
    </footer>
</body>

</html>
