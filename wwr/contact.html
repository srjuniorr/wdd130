<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Whitewater Rafting</title>
    <meta name="description"
      content="Get in touch with us for more information about our rafting trips and services.">
    <meta name="author" content="Flavio Dias Martins Junior">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwrcross.png" alt="Whitewater Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="company-header">
            <h1>White Water Rafting Company</h1>
            <address>
                444 Wasatch Peak Drive<br>
                Salt Lake City, UT 84101<br>
                +1 (801) 555-4321<br>
                info@whitewaterrafting.com
            </address>
        </div>

        <div class="contact-grid">
            <section class="map-section">
                <iframe
                  src="https://maps.google.com/maps?q=Salt+Lake+City&amp;t=&amp;z=13&amp;ie=UTF8&amp;iwloc=&amp;output=embed"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </section>

            <section class="contact-form">
                <form action="#" method="get">
                    <div class="form-item">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Placeholder" required>
                    </div>

                    <div class="form-item">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Placeholder"
                          required>
                    </div>

                    <fieldset class="message-purpose">
                        <legend>Message Purpose</legend>
                        <div class="radio-options">
                            <div class="radio-option">
                                <input type="radio" id="general" name="purpose"
                                  value="General Inquiry" required>
                                <label for="general">General Inquiry</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="reservation" name="purpose"
                                  value="Reservation Question">
                                <label for="reservation">Reservation Question</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="suggestion" name="purpose"
                                  value="Website Suggestion">
                                <label for="suggestion">Website Suggestion</label>
                            </div>
                        </div>
                    </fieldset>

                    <div class="form-item">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Type here"
                          required></textarea>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="newsletter" name="newsletter" value="subscribe">
                        <label for="newsletter">Please subscribe me to the monthly
                            newsletter</label>
                    </div>

                    <div class="button-group">
                        <button type="submit">Get in Touch!</button>
                    </div>
                </form>
            </section>
        </div>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/employee_john.jpg" alt="John Doe">
                    <figcaption>John Doe - Expert Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee_jane.jpg" alt="Jane Smith">
                    <figcaption>Jane Smith - Safety Coordinator</figcaption>
                </figure>
                <figure>
                    <img src="images/employee_mike.jpg" alt="Mike Johnson">
                    <figcaption>Mike Johnson - Logistics Manager</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>©2026 ❄️ Whitewater Rafting ❄️ Flavio Dias Martins Junior</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebookicon.svg" alt="Facebook icon">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedinicon.svg" alt="LinkedIn icon">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="images/instagramicon.svg" alt="Instagram icon">
            </a>
        </nav>
    </footer>
</body>

</html>
